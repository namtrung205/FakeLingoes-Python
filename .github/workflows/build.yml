name: Build and Package

on:
  push:
    branches: [ "main", "release" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "release" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller FakeLingoes.spec

    - name: Compile Inno Setup Script
      run: |
        ./Installer/InnoSetup/ISCC.exe installer.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeLingoes_Setup
        path: installer_output/FakeLingoes_Setup.exe

    - name: Generate Version Tag
      id: tagger
      if: github.event_name == 'push' && github.ref == 'refs/heads/release'
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy.MM.dd.HHmm"
        $tag = "v$date"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag $tag
        git push origin $tag

    - name: Create Release
      if: (github.event_name == 'push' && github.ref == 'refs/heads/release') || contains(github.ref, 'tags')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tagger.outputs.tag || github.ref_name }}
        files: installer_output/FakeLingoes_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
