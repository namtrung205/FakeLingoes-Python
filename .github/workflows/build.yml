name: Build and Package

on:
  push:
    branches: [ "main", "release" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "release" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Calculate and Set Version
      id: versioning
      run: |
        CURRENT_VERSION=$(cat VERSION || echo "0.0.0")
        BRANCH="${{ github.head_ref }}"
        if [ -z "$BRANCH" ]; then BRANCH="${{ github.ref_name }}"; fi
        
        NEW_VERSION=$(python scripts/increment_version.py $CURRENT_VERSION $BRANCH)
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
        # Update files
        echo -n "$NEW_VERSION" > VERSION
        sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/fake_lingoes/__init__.py
        sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"$NEW_VERSION\"/" installer/installer.iss

    - name: Commit and Tag
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add VERSION src/fake_lingoes/__init__.py installer/installer.iss
        git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]" || echo "No changes to commit"
        git tag "v${{ env.NEW_VERSION }}"
        git push origin HEAD --tags

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Sync version files
      shell: pwsh
      run: |
        $newVersion = "${{ env.VERSION }}"
        echo "Building version: $newVersion"
        $newVersion | Out-File -FilePath VERSION -Encoding utf8 -NoNewline
        (Get-Content src/fake_lingoes/__init__.py) -replace '__version__ = ".*"', "__version__ = ""$newVersion""" | Set-Content src/fake_lingoes/__init__.py
        (Get-Content installer/installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion ""$newVersion""" | Set-Content installer/installer.iss

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller fakelingoes.spec

    - name: Download Tesseract
      shell: pwsh
      run: |
        $tesseractPath = "installer/tesseract-ocr-w64-setup-5.5.0.20241111.exe"
        if (-not (Test-Path $tesseractPath)) {
          Invoke-WebRequest -Uri "https://github.com/UB-Mannheim/tesseract/wiki/download/tesseract-ocr-w64-setup-5.5.0.20241111.exe" -OutFile $tesseractPath
        }

    - name: Compile Inno Setup
      run: |
        ./installer/InnoSetup/ISCC.exe installer/installer.iss

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fakelingoes_setup_${{ env.VERSION }}
        path: installer/installer_output/fakelingoes_setup_${{ env.VERSION }}.exe

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Sync version files
      run: |
        NEW_VERSION="${{ env.VERSION }}"
        echo "Building version: $NEW_VERSION"
        echo -n "$NEW_VERSION" > VERSION
        sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/fake_lingoes/__init__.py

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config python3-dev python3-venv tesseract-ocr libasound2-dev espeak scrot libxcb-cursor0 libxkbcommon-x11-0 libdbus-1-3 libgl1 libgirepository1.0-dev libcairo2-dev gir1.2-gstreamer-1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-tools gir1.2-appindicator3-0.1 gir1.2-ayatanaappindicator3-0.1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Build Debian Package
      run: |
        chmod +x scripts/build_deb.sh
        # The script picks up VERSION env var
        export VERSION=${{ env.VERSION }}
        ./scripts/build_deb.sh

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fakelingoes_${{ env.VERSION }}_amd64.deb
        path: installer/fakelingoes_${{ env.VERSION }}_amd64.deb

  create-release:
    needs: [build-windows, build-linux, prepare]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.prepare.outputs.version }}
        name: Release v${{ needs.prepare.outputs.version }}
        files: |
          artifacts/fakelingoes_setup_${{ needs.prepare.outputs.version }}/*.exe
          artifacts/fakelingoes_${{ needs.prepare.outputs.version }}_amd64.deb/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
