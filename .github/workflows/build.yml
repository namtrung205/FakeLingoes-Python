name: Build and Package

on:
  push:
    branches: [ "main", "release" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "release" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Calculate and Set Version
      id: versioning
      shell: pwsh
      run: |
        $currentVersion = Get-Content VERSION
        $branch = "${{ github.head_ref }}"
        if (-not $branch) {
          $branch = ("${{ github.ref_name }}")
        }
        
        $newVersion = python scripts/increment_version.py $currentVersion $branch
        echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV
        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
        
        $newVersion | Out-File -FilePath VERSION -Encoding utf8 -NoNewline
        (Get-Content src/fake_lingoes/__init__.py) -replace '__version__ = ".*"', "__version__ = ""$newVersion""" | Set-Content src/fake_lingoes/__init__.py
        (Get-Content Installer/installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion ""$newVersion""" | Set-Content Installer/installer.iss

    - name: Build with PyInstaller
      run: |
        pyinstaller FakeLingoes.spec

    - name: Download Tesseract Installer
      shell: pwsh
      run: |
        $tesseractPath = "Installer/tesseract-ocr-w64-setup-5.5.0.20241111.exe"
        if (-not (Test-Path $tesseractPath)) {
          echo "Downloading Tesseract installer..."
          Invoke-WebRequest -Uri "https://github.com/UB-Mannheim/tesseract/wiki/download/tesseract-ocr-w64-setup-5.5.0.20241111.exe" -OutFile $tesseractPath
        } else {
          echo "Tesseract installer already exists in Installer/ folder."
        }

    - name: Compile Inno Setup Script
      run: |
        ./Installer/InnoSetup/ISCC.exe Installer/installer.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeLingoes_Setup_${{ env.NEW_VERSION || steps.versioning.outputs.version }}
        path: Installer/installer_output/FakeLingoes_Setup_${{ env.NEW_VERSION || steps.versioning.outputs.version }}.exe

    - name: Commit and Tag Version
      if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || github.ref == 'refs/heads/main')
      shell: pwsh
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add VERSION src/fake_lingoes/__init__.py Installer/installer.iss
        git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
        git tag "v${{ env.NEW_VERSION }}"
        git push origin HEAD --tags

    - name: Create Release (Windows)
      if: (github.event_name == 'push' && github.ref == 'refs/heads/release') || contains(github.ref, 'tags')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.NEW_VERSION || steps.versioning.outputs.version }}
        files: Installer/installer_output/FakeLingoes_Setup_${{ env.NEW_VERSION || steps.versioning.outputs.version }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config python3-dev python3-venv tesseract-ocr libasound2-dev espeak scrot libxcb-cursor0 libxkbcommon-x11-0 libdbus-1-3 libgl1 libgirepository1.0-dev libcairo2-dev gir1.2-gstreamer-1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-tools gir1.2-appindicator3-0.1 gir1.2-ayatanaappindicator3-0.1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Calculate and Set Version
      id: versioning
      run: |
        CURRENT_VERSION=$(cat VERSION)
        BRANCH="${{ github.head_ref }}"
        if [ -z "$BRANCH" ]; then BRANCH="${{ github.ref_name }}"; fi
        
        NEW_VERSION=$(python scripts/increment_version.py $CURRENT_VERSION $BRANCH)
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
        # We don't commit from here, only use the version variable

    - name: Build Debian Package
      run: |
        chmod +x scripts/build_deb.sh
        # The script picks up VERSION env var
        ./scripts/build_deb.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fakelingoes_${{ env.VERSION }}_amd64.deb
        path: Installer/fakelingoes_${{ env.VERSION }}_amd64.deb

    - name: Release (Linux)
      if: (github.event_name == 'push' && github.ref == 'refs/heads/release') || contains(github.ref, 'tags')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: Installer/fakelingoes_${{ env.VERSION }}_amd64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
